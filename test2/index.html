// CSV文字列をパースして配列に変換
function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const cols = line.split(',');
    return {
      yearMonth: cols[0],
      gender: cols[1],
      prevPrevMonthPopulation: cols[2] === '' ? null : Number(cols[2]),
      birth: Number(cols[3]),
      death: Number(cols[4]),
      inMigration: Number(cols[5]),
      outMigration: Number(cols[6]),
      prevMonthPopulation: Number(cols[7]),
      change: Number(cols[8])
    };
  });
}

const data = parseCSV(csvData);

// 年月順ソート（年月は「yyyymm」形式なのでそのまま並び替えで良い）
// 男女が別の行なので、年月でまとめるためグルーピングする

// 男女別人口推移用にデータ整形
const labels = [...new Set(data.map(d => d.yearMonth))].sort();

// 男女別人口（prevMonthPopulation）推移
const populationMale = [];
const populationFemale = [];
// 男女別増減（change）推移
const changeMale = [];
const changeFemale = [];

labels.forEach(ym => {
  const male = data.find(d => d.yearMonth === ym && d.gender === '男');
  const female = data.find(d => d.yearMonth === ym && d.gender === '女');
  populationMale.push(male ? male.prevMonthPopulation : null);
  populationFemale.push(female ? female.prevMonthPopulation : null);
  changeMale.push(male ? male.change : null);
  changeFemale.push(female ? female.change : null);
});

// Chart.js でグラフ作成
const ctxPop = document.getElementById('populationChart').getContext('2d');
const populationChart = new Chart(ctxPop, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [
      {
        label: '男',
        data: populationMale,
        borderColor: 'blue',
        backgroundColor: 'transparent',
        tension: 0.1
      },
      {
        label: '女',
        data: populationFemale,
        borderColor: 'red',
        backgroundColor: 'transparent',
        tension: 0.1
      }
    ]
  },
  options: {
    responsive: true,
    interaction: {
      mode: 'index',
      intersect: false,
    },
    stacked: false,
    plugins: {
      title: { display: false },
      legend: { position: 'top' }
    },
    scales: {
      y: {
        beginAtZero: false,
        title: {
          display: true,
          text: '人口'
        }
      },
      x: {
        title: { display: true, text: '年月 (yyyyMM)' }
      }
    }
  }
});

const ctxChange = document.getElementById('changeChart').getContext('2d');
const changeChart = new Chart(ctxChange, {
  type: 'line',

});

// データ表の作成
const tbody = document.querySelector('#dataTable tbody');
data.forEach(d => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${d.yearMonth}</td>
    <td>${d.gender}</td>
    <td>${d.prevPrevMonthPopulation === null ? '' : d.prevPrevMonthPopulation}</td>
    <td>${d.birth}</td>
    <td>${d.death}</td>
    <td>${d.inMigration}</td>
    <td>${d.outMigration}</td>
    <td>${d.prevMonthPopulation}</td>
    <td>${d.change}</td>
  `;
  tbody.appendChild(tr);
});
